<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analyse foncière</title>
<style>
  :root {
    --bg: #F7F8FA;
    --surface: #FFFFFF;
    --ink: #101828;
    --ink-soft: #667085;
    --line: #E4E7EC;
    --accent: #1F4FD8;
    --ok: #12805C;
    --warn: #B54708;
    --bad: #B42318;
    --idle: #C1C7D0;
    --mono: "IBM Plex Mono", ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: Inter, -apple-system, "Segoe UI", sans-serif;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 48px 20px 80px; }
  h1 { font-size: 30px; letter-spacing: -0.02em; margin: 0 0 6px; }
  .sub { color: var(--ink-soft); margin: 0 0 28px; font-size: 15px; }
  .card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 12px; padding: 22px;
  }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .row { display: flex; gap: 10px; }
  input[type=text] {
    flex: 1; padding: 12px 14px; font-size: 15px; font-family: inherit;
    border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--ink);
  }
  input[type=text]:focus { outline: 2px solid var(--accent); outline-offset: -1px; border-color: transparent; }
  button {
    padding: 12px 22px; font-size: 15px; font-weight: 600; font-family: inherit;
    background: var(--accent); color: #fff; border: 0; border-radius: 8px; cursor: pointer;
  }
  button:disabled { background: var(--idle); cursor: default; }
  button.ghost { background: transparent; color: var(--accent); border: 1px solid var(--line); }

  /* Autocomplete BAN */
  .ac-host { position: relative; flex: 1; }
  .ac-list {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 30;
    background: #fff; border: 1px solid var(--line); border-radius: 8px;
    box-shadow: 0 8px 24px rgba(16,24,40,.10); overflow: hidden;
  }
  .ac-item { padding: 10px 14px; font-size: 14px; cursor: pointer; }
  .ac-item:hover, .ac-item.on { background: #F2F4F7; }

  /* Cascade */
  .step { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .step:last-child { border-bottom: 0; }
  .voyant { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; flex: 0 0 10px; background: var(--idle); }
  .voyant.run { background: var(--accent); animation: pulse 1s infinite; }
  .voyant.ok { background: var(--ok); }
  .voyant.warn { background: var(--warn); }
  .voyant.bad { background: var(--bad); }
  @keyframes pulse { 50% { opacity: .3; } }
  .step-t { font-size: 14px; font-weight: 600; }
  .step-d { font-size: 13px; color: var(--ink-soft); font-family: var(--mono); margin-top: 2px; }

  /* Verdict */
  .verdict { border-left: 4px solid var(--idle); padding: 16px 18px; border-radius: 8px; background: #fff; margin-bottom: 14px; }
  .verdict.eleve, .verdict.tres-eleve { border-left-color: var(--ok); }
  .verdict.probable { border-left-color: var(--warn); }
  .verdict.faible, .verdict.tres-faible, .verdict.exclu { border-left-color: var(--bad); }
  .verdict h3 { margin: 0 0 4px; font-size: 15px; }
  .verdict .val { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .verdict .why { font-size: 13px; color: var(--ink-soft); margin-top: 6px; line-height: 1.5; }
  .tag { display: inline-block; font-size: 11px; font-family: var(--mono); text-transform: uppercase;
         padding: 2px 7px; border: 1px solid var(--line); border-radius: 4px; color: var(--ink-soft); margin-left: 8px; }
  .hidden { display: none; }

  @media print {
    body { background: #fff; }
    .no-print { display: none !important; }
    .wrap { padding: 0; max-width: none; }
    .card { border: 0; padding: 0; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div id="view-search">
    <h1>Analyse foncière</h1>
    <p class="sub">Avant une estimation ou une prise de mandat, le potentiel réel de la parcelle.</p>
    <div class="card">
      <label for="addr">Adresse du bien</label>
      <div class="row">
        <div class="ac-host">
          <input type="text" id="addr" autocomplete="off" placeholder="12 rue des Capucins, 61000 Alencon">
          <div id="ac" class="ac-list hidden"></div>
        </div>
        <button id="go" disabled>Analyser</button>
      </div>
    </div>
  </div>

  <div id="view-run" class="hidden">
    <h1>Analyse en cours</h1>
    <p class="sub" id="run-sub"></p>
    <div class="card" id="steps"></div>
  </div>

  <div id="view-report" class="hidden">
    <div id="report"></div>
    <div class="row no-print" style="margin-top:20px">
      <button onclick="window.print()">Exporter l'etude</button>
      <button class="ghost" onclick="location.reload()">Nouvelle analyse</button>
    </div>
  </div>

</div>
<script src="foncier-app.js"></script>
</body>
</html>
